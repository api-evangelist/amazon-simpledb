aid: amazon-simpledb
name: Amazon SimpleDB
description: >-
  Amazon SimpleDB is a highly available NoSQL data store that offloads the
  work of database administration. It provides simple and powerful data
  storage and querying capabilities to enable you to build web applications
  with structured data storage without the overhead of database administration.
